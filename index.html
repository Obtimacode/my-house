<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكالمات MyHouse</title>
    <!-- استدعاء مكتبة PeerJS للمكالمات الصوتية -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        #app { display: none; }
        .user-card { border: 1px solid #fff; padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="setup">
        <input type="text" id="username" placeholder="اكتب اسمك هنا">
        <button onclick="join()">دخول</button>
    </div>

    <!-- شاشة التطبيق -->
    <div id="app">
        <h2>المتواجدون حالياً:</h2>
        <div id="usersList"></div>
        <br>
        <button onclick="toggleMute()">ميوت / فتح الصوت</button>
        <button onclick="toggleSpeaker()">مكبر الصوت</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" }));
        let myPeer, myStream;

        window.join = async () => {
            const name = document.getElementById('username').value;
            myPeer = new Peer(); // إنشاء معرف فريد للجهاز
            
            myPeer.on('open', (id) => {
                // حفظ المستخدم في فايربيس
                set(ref(db, 'users/' + id), { name: name });
                onDisconnect(ref(db, 'users/' + id)).remove();
                
                document.getElementById('setup').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            });

            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        };

        // عرض المستخدمين
        onValue(ref(db, 'users/'), (snapshot) => {
            const users = snapshot.val();
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            for(let id in users) {
                list.innerHTML += `<div class="user-card" onclick="callUser('${id}')">${users[id].name}</div>`;
            }
        });

        window.callUser = (id) => {
            const call = myPeer.call(id, myStream);
            call.on('stream', (userStream) => { /* تشغيل صوت الطرف الآخر */ });
        };

        window.toggleMute = () => {
            myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled;
        };
    </script>
</body>
</html>
