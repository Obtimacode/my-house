<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyHouse Cozy Cinema</title>
    <!-- PeerJS للمكالمات الصوتية المباشرة -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- مكتبة Lucide للأيقونات العصرية الأنيقة -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #05070f;
            --card-bg: rgba(13, 18, 33, 0.75);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #0066ff;
            --accent-hover: #0052cc;
            --danger-red: #ef4444;
            --danger-hover: #dc2626;
            --success-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --text-secondary: #9ca3af;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #111e3b 0%, #05070f 70%);
        }

        /* حاوية التنبيهات المنبثقة (Toast Notification) */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 400px; 
            padding: 35px 28px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center; 
            transition: all 0.4s ease;
        }
        
        h1 { 
            font-size: 22px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--text-main); 
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }
        
        .avatar-picker { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            margin: 0 auto 28px; 
            cursor: pointer; 
        }
        .avatar-picker img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--accent-blue); 
            box-shadow: 0 10px 25px rgba(0, 102, 255, 0.15);
            transition: transform 0.3s;
        }
        .avatar-picker:hover img {
            transform: scale(1.04);
        }
        .avatar-picker input { display: none; }
        .avatar-overlay { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            background: var(--accent-blue); 
            padding: 7px; 
            border-radius: 50%; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px solid #0d1221;
        }
        .avatar-overlay svg { width: 14px; height: 14px; }
        
        input[type="text"] { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            margin-bottom: 20px; 
            outline: none; 
            text-align: center;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 102, 255, 0.02);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent-blue); 
            border: none; 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { 
            background: var(--accent-hover); 
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        
        #app-screen { display: none; }

        /* مظهر لوحة الكود الشخصي */
        .my-code-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 28px;
        }
        .my-code-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .my-code-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 3px;
        }

        /* فاصل خطي أنيق */
        .divider {
            position: relative;
            margin: 28px 0;
            text-align: center;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }
        .divider span {
            position: relative;
            background: #0b0f19;
            padding: 0 15px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 2;
        }

        /* شاشة السينما والمكالمة */
        #call-screen { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #030408; z-index: 100; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 25px 20px;
        }

        /* شاشة الرنين / الاتصال الوارد */
        .calling-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .avatar-ring {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }
        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            z-index: 10;
            position: relative;
        }
        /* تموجات الحركة الدائرية للأفتار أثناء الرنين */
        .avatar-ring::before, .avatar-ring::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--accent-blue);
            opacity: 0.3;
            z-index: 1;
            animation: pulseRing 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .avatar-ring::after {
            animation-delay: 0.5s;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        
        /* مساحة الفيديو والسينما */
        .cinema-room {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 65%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none; /* تظهر فقط بعد الاتصال الفعلي */
            flex-direction: column;
            justify-content: center;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        #video-container {
            width: 100%;
            height: 100%;
        }

        #player {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* حقل إدخال رابط الفيديو */
        .video-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: #080c14;
            position: relative;
            z-index: 30;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .video-selector input {
            flex: 1;
            padding: 12px 16px;
            background: #03050a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            color: white;
            font-size: 13px;
            margin-bottom: 0;
            text-align: right;
        }
        .video-selector button {
            width: auto;
            padding: 12px 20px;
            font-size: 13px;
            border-radius: 10px;
        }

        /* التفاعلات الطائرة */
        .reactions-bar {
            position: absolute;
            bottom: 80px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            background: rgba(13, 18, 33, 0.55);
            padding: 10px 22px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 20;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .react-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            padding: 0;
            transition: transform 0.1s;
        }
        .react-btn:active { transform: scale(1.3); }

        /* حاوية عناصر الإيموجي الطائرة */
        .floating-container {
            position: absolute;
            bottom: 140px; 
            width: 100%;
            height: 60%;
            pointer-events: none;
            overflow: hidden;
            z-index: 15;
        }

        .floating-emoji {
            position: absolute;
            bottom: 0;
            font-size: 32px;
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-300px) scale(1) rotate(var(--rot)); opacity: 0; }
        }

        /* أزرار التحكم في المكالمة */
        .controls { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            width: 100%; 
            margin-top: 20px; 
            z-index: 40;
        }
        .btn-control { 
            width: 56px; 
            height: 56px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            cursor: pointer; 
            color: white;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-control:hover {
            transform: scale(1.08);
        }
        .btn-control:active { transform: scale(0.95); }
        .btn-mute { background: #1f2937; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-mute:hover { background: #374151; }
        .btn-mute.active { background: var(--danger-red); }
        .btn-hangup { background: var(--danger-red); }
        .btn-hangup:hover { background: var(--danger-hover); }
        .btn-accept { 
            background: var(--success-green); 
            gap: 10px; 
            border-radius: 30px; 
            width: auto; 
            padding: 0 24px; 
            font-weight: 600; 
            font-size: 14px; 
        }
        .btn-accept:hover { background: #059669; }

        @media (max-width: 480px) {
            .cinema-room { height: 65%; }
            #call-screen { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <!-- حاوية التنبيهات السريعة -->
    <div id="toast-container" class="toast-container"></div>

    <div class="container" id="main-container">
        <!-- 1. شاشة الدخول -->
        <div id="login-screen">
            <h1>انضم إلى MyHouse Cinema</h1>
            <p class="subtitle">تواصل بالصوت وشاهد فيديوهات يوتيوب بالتزامن</p>
            <div class="avatar-picker" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="Avatar">
                <div class="avatar-overlay">
                    <i data-lucide="camera"></i>
                </div>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <input type="text" id="username" placeholder="اكتب اسمك المستعار..." autocomplete="off">
            <button id="btn-join">
                <i data-lucide="log-in"></i>
                دخول الآن
            </button>
        </div>

        <!-- 2. شاشة توليد الكود والاتصال -->
        <div id="app-screen">
            <h1>غرفتك الخاصة 🔑</h1>
            <p class="subtitle" style="margin-bottom: 20px;">شارك كود غرفتك للاتصال السريع</p>
            
            <div class="my-code-panel">
                <div class="my-code-title">رمز الاتصال الخاص بك</div>
                <div class="my-code-value" id="my-6digit-code">------</div>
            </div>

            <div class="divider">
                <span>تواصل مع صديق</span>
            </div>

            <input type="text" id="target-code-input" placeholder="اكتب رمز صديقك المكون من 6 أرقام..." maxlength="7" autocomplete="off" style="font-size: 18px; font-weight: 600; letter-spacing: 1px;">
            <button id="btn-call-by-code">
                <i data-lucide="phone-call"></i>
                اتصال الآن
            </button>
        </div>
    </div>

    <!-- 3. شاشة السينما والمكالمة الصوتية المباشرة الموحدة -->
    <div id="call-screen">
        
        <!-- حالة الانتظار (الرنين والاتصال) -->
        <div class="calling-state-container" id="calling-state-view">
            <div class="avatar-ring">
                <img id="partner-avatar-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="">
            </div>
            <h3 id="call-user-name" style="font-weight: 600; font-size: 22px; margin-bottom: 8px;">اسم الطرف الآخر</h3>
            <p id="call-status-text" style="color: var(--text-secondary); font-size: 14px;">جاري إنشاء الاتصال الآمن...</p>
        </div>

        <!-- غرفة السينما المشتركة (تخفى في وضع الاتصال وتظهر عند قبول المكالمة) -->
        <div class="cinema-room" id="cinema-room">
            <div id="video-container">
                <div id="player"></div>
            </div>

            <div class="floating-container" id="floating-container"></div>

            <div class="reactions-bar">
                <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
                <button class="react-btn" onclick="sendReaction('😂')">😂</button>
                <button class="react-btn" onclick="sendReaction('😮')">😮</button>
                <button class="react-btn" onclick="sendReaction('😭')">😭</button>
            </div>

            <div class="video-selector">
                <input type="text" id="video-url" placeholder="ألصق رابط فيديو يوتيوب هنا...">
                <button id="btn-load-video">شغّل</button>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-mute" class="btn-control btn-mute">
                <i data-lucide="mic"></i>
            </button>
            <button id="btn-accept" class="btn-control btn-accept" style="display: none;">
                <i data-lucide="phone"></i>
                قبول الاتصال
            </button>
            <button id="btn-hangup" class="btn-control btn-hangup">
                <i data-lucide="phone-off"></i>
            </button>
        </div>
    </div>

    <!-- عنصر الصوت -->
    <audio id="remote-audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, remove, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, myAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=default";
        let my6DigitCode = "";
        let peer, localStream, currentCall, partnerId = null;
        let ytPlayer = null;
        
        let ignoreNextStateChange = false; 
        let lastActionSent = null;

        // تفعيل الأيقونات الأساسية
        lucide.createIcons();

        // نظام تنبيهات التوست
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let iconName = 'info';
            if (type === 'success') iconName = 'check-circle';
            if (type === 'danger') iconName = 'alert-triangle';

            toast.innerHTML = `
                <i data-lucide="${iconName}" style="color: ${type === 'danger' ? 'var(--danger-red)' : type === 'success' ? 'var(--success-green)' : 'var(--accent-blue)'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.animation = 'slideUpFade 0.3s reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // توليد رمز مكون من 6 أرقام فريد
        function generate6DigitCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // تحسين تنسيق حقل الكود أثناء الكتابة
        document.getElementById('target-code-input').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 3) {
                val = val.slice(0, 3) + ' ' + val.slice(3, 6);
            }
            e.target.value = val;
        });

        function loadYoutubeAPI() {
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            } else {
                onYouTubeIframeAPIReady();
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '5qap5aO4i9A',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'rel': 0,
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            ytPlayer.unMute();
            ytPlayer.setVolume(80);
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    myAvatar = event.target.result;
                    document.getElementById('avatar-preview').src = myAvatar;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("الرجاء كتابة الاسم المستعار!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert("يجب السماح بالوصول للمايكروفون للاتصال بالصوت!");
                return;
            }

            peer = new Peer({
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', async (id) => {
                myId = id;
                my6DigitCode = generate6DigitCode();

                // حفظ بيانات المستخدم والرمز في Firebase
                const userRef = ref(db, 'users/' + myId);
                const codeRef = ref(db, 'codes/' + my6DigitCode);

                await set(userRef, { name: myName, avatar: myAvatar, code: my6DigitCode });
                await set(codeRef, { peerId: myId, name: myName, avatar: myAvatar });

                onDisconnect(userRef).remove();
                onDisconnect(codeRef).remove();

                // عرض الكود الشخصي للمستخدم
                const formattedCode = my6DigitCode.slice(0, 3) + ' ' + my6DigitCode.slice(3, 6);
                document.getElementById('my-6digit-code').innerText = formattedCode;

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                
                loadYoutubeAPI();
                listenForIncomingCalls();
            });

            peer.on('error', (err) => {
                console.error("PeerJS Error:", err);
                showToast("حدث خطأ في الاتصال بالسيرفر", "danger");
            });
        });

        // الاتصال عبر الكود السري
        document.getElementById('btn-call-by-code').addEventListener('click', async () => {
            const rawCode = document.getElementById('target-code-input').value.replace(/\s+/g, '');
            if (rawCode.length !== 6) {
                return showToast("الرجاء إدخال كود صحيح من 6 أرقام!", "danger");
            }

            if (rawCode === my6DigitCode) {
                return showToast("لا يمكنك الاتصال برمزك الشخصي!", "danger");
            }

            showToast("جاري البحث عن الكود...", "info");

            // البحث عن كود الطرف الآخر في Firebase
            const codeSnapshot = await get(ref(db, 'codes/' + rawCode));
            if (!codeSnapshot.exists()) {
                return showToast("لم يتم العثور على أي شخص بهذا الرمز!", "danger");
            }

            const targetUser = codeSnapshot.val();
            startCall(targetUser.peerId, targetUser.name, targetUser.avatar);
        });

        function startCall(targetId, targetName, targetAvatar) {
            partnerId = targetId;
            document.getElementById('partner-avatar-img').src = targetAvatar || "https://api.dicebear.com/7.x/bottts/svg?seed=default";
            document.getElementById('call-user-name').innerText = targetName;
            document.getElementById('btn-accept').style.display = 'none';
            document.getElementById('cinema-room').style.display = 'none';
            document.getElementById('calling-state-view').style.display = 'flex';
            document.getElementById('call-screen').style.display = 'flex';

            document.getElementById('call-status-text').innerText = "جاري الاتصال الصوتي وصنع السينما...";

            const remoteAudio = document.getElementById('remote-audio');
            remoteAudio.play().catch(() => {});

            currentCall = peer.call(targetId, localStream);
            handleCallStreams(currentCall);
            setupCinemaSync();
        }

        function listenForIncomingCalls() {
            peer.on('call', (incomingCall) => {
                currentCall = incomingCall;
                partnerId = incomingCall.peer;
                
                onValue(ref(db, 'users/' + partnerId), (snapshot) => {
                    const caller = snapshot.val();
                    if (caller) {
                        document.getElementById('partner-avatar-img').src = caller.avatar;
                        document.getElementById('call-user-name').innerText = caller.name;
                        showToast(`مكالمة واردة من ${caller.name}`, "success");
                    }
                }, { onlyOnce: true });

                document.getElementById('call-status-text').innerText = "مكالمة واردة...";
                document.getElementById('btn-accept').style.display = 'inline-flex';
                document.getElementById('cinema-room').style.display = 'none';
                document.getElementById('calling-state-view').style.display = 'flex';
                document.getElementById('call-screen').style.display = 'flex';

                document.getElementById('btn-accept').onclick = () => {
                    const remoteAudio = document.getElementById('remote-audio');
                    remoteAudio.play().catch(() => {});

                    currentCall.answer(localStream);
                    document.getElementById('btn-accept').style.display = 'none';
                    handleCallStreams(currentCall);
                    setupCinemaSync();
                };
            });
        }

        window.sendReaction = function(emoji) {
            if (!partnerId) return;
            const reactionId = Date.now();
            set(ref(db, `calls/${myId}_${partnerId}/reactions/${reactionId}`), { emoji: emoji });
            set(ref(db, `calls/${partnerId}_${myId}/reactions/${reactionId}`), { emoji: emoji });
            showFloatingEmoji(emoji);
        };

        function showFloatingEmoji(emoji) {
            const container = document.getElementById('floating-container');
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = emoji;
            
            const leftOffset = Math.random() * 80 + 10; 
            const rotation = (Math.random() * 90 - 45) + "deg";
            
            el.style.left = `${leftOffset}%`;
            el.style.setProperty('--rot', rotation);

            container.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        document.getElementById('btn-load-video').addEventListener('click', () => {
            const urlInput = document.getElementById('video-url').value;
            const videoId = extractYouTubeId(urlInput);
            if (videoId && partnerId) {
                const videoData = { videoId: videoId, action: 'load', time: 0, timestamp: Date.now() };
                set(ref(db, `calls/${myId}_${partnerId}/videoState`), videoData);
                set(ref(db, `calls/${partnerId}_${myId}/videoState`), videoData);
            }
        });

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onPlayerStateChange(event) {
            if (ignoreNextStateChange) return;

            let action = '';
            if (event.data === YT.PlayerState.PLAYING) action = 'play';
            if (event.data === YT.PlayerState.PAUSED) action = 'pause';

            if (action !== '' && action !== lastActionSent) {
                lastActionSent = action;
                const videoState = {
                    action: action,
                    time: ytPlayer.getCurrentTime(),
                    timestamp: Date.now()
                };
                if (partnerId) {
                    update(ref(db, `calls/${myId}_${partnerId}/videoState`), videoState);
                    update(ref(db, `calls/${partnerId}_${myId}/videoState`), videoState);
                }
            }
        }

        function setupCinemaSync() {
            const listenSync = (callKey) => {
                onValue(ref(db, `calls/${callKey}/videoState`), (snapshot) => {
                    if (!snapshot.exists() || !ytPlayer) return;
                    const data = snapshot.val();
                    
                    ignoreNextStateChange = true;

                    if (data.action === 'load') {
                        ytPlayer.loadVideoById(data.videoId, 0);
                        setTimeout(() => { ignoreNextStateChange = false; }, 1000);
                        return;
                    }

                    const localTime = ytPlayer.getCurrentTime();
                    const diff = Math.abs(localTime - data.time);

                    if (data.action === 'play') {
                        if (diff > 1.5) {
                            ytPlayer.seekTo(data.time, true);
                        }
                        ytPlayer.playVideo();
                    } else if (data.action === 'pause') {
                        ytPlayer.pauseVideo();
                        if (diff > 1.5) {
                            ytPlayer.seekTo(data.time, true);
                        }
                    }

                    setTimeout(() => {
                        ignoreNextStateChange = false;
                    }, 500);
                });

                onValue(ref(db, `calls/${callKey}/reactions`), (snapshot) => {
                    if (snapshot.exists()) {
                        const reactions = snapshot.val();
                        const keys = Object.keys(reactions);
                        const latestKey = keys[keys.length - 1];
                        
                        if (Date.now() - Number(latestKey) < 2000) {
                            showFloatingEmoji(reactions[latestKey].emoji);
                        }
                    }
                });
            };

            listenSync(`${myId}_${partnerId}`);
            listenSync(`${partnerId}_${myId}`);
        }

        function handleCallStreams(call) {
            call.on('stream', (remoteStream) => {
                // إظهار تنبيه نجاح الاتصال
                showToast("تم الاتصال بنجاح!", "success");

                // إخفاء واجهة الرنين وإظهار السينما
                document.getElementById('calling-state-view').style.display = 'none';
                document.getElementById('cinema-room').style.display = 'flex';

                const remoteAudio = document.getElementById('remote-audio');
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play().catch(e => {
                    console.log("Audio play deferred to user click.", e);
                });
            });

            call.on('close', () => {
                showToast("قطع الطرف الآخر الاتصال", "danger");
                endCallInterface();
            });
        }

        document.getElementById('btn-hangup').addEventListener('click', () => {
            if(currentCall) currentCall.close();
            remove(ref(db, `calls/${myId}_${partnerId}`));
            remove(ref(db, `calls/${partnerId}_${myId}`));
            showToast("قمت بإنهاء المكالمة", "info");
            endCallInterface();
        });

        function endCallInterface() {
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('cinema-room').style.display = 'none';
            document.getElementById('calling-state-view').style.display = 'flex';
            document.getElementById('remote-audio').srcObject = null;
            if (ytPlayer) ytPlayer.stopVideo();
            partnerId = null;
        }

        let isMuted = false;
        document.getElementById('btn-mute').addEventListener('click', () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('btn-mute').classList.toggle('active', isMuted);
            
            const icon = document.querySelector('#btn-mute i');
            if (isMuted) {
                icon.setAttribute('data-lucide', 'mic-off');
                showToast("تم كتم الصوت", "info");
            } else {
                icon.setAttribute('data-lucide', 'mic');
                showToast("تم إلغاء كتم الصوت", "success");
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
