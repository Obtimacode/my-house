    <style>
        /* كل الأنماط كما هي بدون تغيير */
        :root {
            --bg-dark: #05070f;
            --card-bg: rgba(13, 18, 33, 0.75);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-blue: #0066ff;
            --accent-hover: #0052cc;
            --danger-red: #ef4444;
            --danger-hover: #dc2626;
            --success-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            --text-secondary: #9ca3af;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3, .my-code-value {
            font-family: 'Cabinet Grotesk', 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow-y: auto;
            background-image: radial-gradient(circle at 50% -20%, #111e3b 0%, #05070f 70%);
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 420px; 
            padding: 35px 28px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center; 
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 20px 0;
        }
        
        .container.app-expanded {
            max-width: 500px; 
        }
        
        h1 { 
            font-size: 28px; 
            font-weight: 900; 
            margin-bottom: 8px; 
            color: var(--text-main); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .site-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 8px rgba(0, 102, 255, 0.3));
            flex-shrink: 0;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .avatar-picker { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            margin: 0 auto 24px; 
            cursor: pointer; 
        }
        .avatar-picker img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--accent-blue); 
        }
        .avatar-picker input { display: none; }
        .avatar-overlay { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            background: var(--accent-blue); 
            padding: 7px; 
            border-radius: 50%; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px solid #0d1221;
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            color: white; 
            font-size: 15px; 
            font-weight: 700;
            margin-bottom: 20px; 
            outline: none; 
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        #target-code-input {
            direction: ltr !important;
            text-align: center;
            letter-spacing: 2px;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent-blue); 
            border: none; 
            border-radius: 14px; 
            color: white; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { 
            background: var(--accent-hover); 
        }
        
        #app-screen { display: none; }

        .my-code-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .my-code-title {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .my-code-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-blue);
            letter-spacing: 3px;
            direction: ltr !important;
            display: inline-block;
        }

        .partner-found-card {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            margin-top: 15px;
            align-items: center;
            justify-content: space-between;
        }
        .partner-found-info {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }
        .partner-found-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .partner-found-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-mini {
            width: auto;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-mini-cancel { background: #1f2937; }

        .support-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px;
            margin-top: 25px;
            text-align: center;
        }
        .support-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .support-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            line-height: 1.5;
        }
        .presets-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn-preset {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            width: auto;
            transition: all 0.2s ease;
        }
        .btn-preset:hover, .btn-preset.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .custom-donation-wrapper {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 4px 12px;
            direction: ltr !important;
        }
        .custom-donation-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
            font-weight: 700;
            width: 100%;
            text-align: left;
            padding: 6px;
            margin-bottom: 0 !important;
        }
        .custom-donation-wrapper span {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 800;
            padding-left: 4px;
        }

        #call-screen { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #030408; 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            padding: 15px;
            overflow-y: auto;
        }

        .calling-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .calling-state-container h3 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .cinema-room {
            width: 100%;
            max-width: 1150px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 1px solid var(--card-border);
            margin-top: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .cinema-grid {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        #video-container {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; 
            background: #000;
        }

        #video-container iframe, #player {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            border: none;
        }

        .video-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 15px;
            background: #080c14;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .search-row {
            display: flex;
            gap: 10px;
        }
        .search-row input {
            flex: 1;
            padding: 12px 16px;
            background: #03050a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 0;
            text-align: left;
        }
        .search-row button {
            width: auto;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            white-space: nowrap;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 250px; 
            background: #060913;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-header {
            padding: 10px 15px;
            background: #090e1c;
            font-size: 13px;
            font-weight: 800;
            color: var(--accent-blue);
