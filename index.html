<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyHouse Cozy 2D Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }
        
        /* شاشة الدخول */
        .login-container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 400px; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            z-index: 10;
        }
        
        .avatar-picker { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        .avatar-picker img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
        .avatar-picker input { display: none; }
        .avatar-overlay { position: absolute; bottom: 2px; right: 2px; background: var(--accent); padding: 6px; border-radius: 50%; font-size: 12px; }
        
        input[type="text"] { 
            width: 100%; padding: 14px; background: #273549; border: 2px solid #334155; 
            border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; text-align: center;
        }
        
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }

        #app-screen { display: none; text-align: center; width: 100%; max-width: 400px; }
        .users-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .user-card { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--card-bg); margin-bottom: 10px; border-radius: 14px; cursor: pointer; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* شاشة الغرفة الكبيرة */
        #room-screen {
            display: none;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0b0f19;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* الغرفة الافتراضية 2D */
        .room-canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 50vh;
            background: #1e1b4b; /* لون أرضية البيت الدافئ */
            border-bottom: 8px solid #312e81;
            overflow: hidden;
        }

        #room-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* شاشة السينما فوق الكانفاس */
        .tv-screen {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 135px;
            background: #000;
            border: 6px solid #475569;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 5;
        }
        #player { width: 100%; height: 100%; }

        /* أزرار التحكم في الفيديو */
        .tv-controls {
            position: absolute;
            top: 155px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 5;
        }
        .tv-controls input {
            padding: 4px 8px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-size: 11px;
            width: 140px;
        }
        .tv-controls button {
            width: auto;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* لوحة التحكم السفلية وتفاعلات الأفاتار */
        .bottom-panel {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
            align-items: center;
        }

        .interaction-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        .btn-interact {
            flex: 1;
            max-width: 120px;
            padding: 10px;
            font-size: 14px;
            border-radius: 12px;
            background: #4f46e5;
            display: none; /* تظهر فقط عند الاقتراب */
        }

        .controls-row {
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }
        .btn-round {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: none;
            cursor: pointer;
            background: #334155;
            color: white;
        }
        .btn-hangup { background: var(--danger); }
        .btn-mute.active { background: var(--danger); }

        /* عصا التحكم للهواتف (Touch Joystick) */
        .joystick-container {
            display: flex;
            gap: 8px;
        }
        .joy-btn {
            width: 45px;
            height: 45px;
            background: #334155;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .tv-screen { width: 180px; height: 101px; }
            .tv-controls { top: 120px; }
            .tv-controls input { width: 100px; }
        }
    </style>
</head>
<body>

    <!-- 1. شاشة الدخول -->
    <div id="login-screen" class="login-container">
        <h1>MyHouse Cozy Room 🏠</h1>
        <p style="color: #94a3b8; margin-bottom: 20px; font-size: 14px;">بيت افتراضي ثنائي الأبعاد للسينما والمكالمات</p>
        <div class="avatar-picker" onclick="document.getElementById('file-input').click()">
            <img id="avatar-preview" src="https://api.dicebear.com/7.x/adventurer/svg?seed=default" alt="Avatar">
            <div class="avatar-overlay">📸</div>
            <input type="file" id="file-input" accept="image/*">
        </div>
        <input type="text" id="username" placeholder="اكتب اسمك المستعار..." autocomplete="off">
        <button id="btn-join">دخول الغرفة الافتراضية</button>
    </div>

    <!-- 2. شاشة المتواجدين للاتصال -->
    <div id="app-screen">
        <div class="login-container">
            <h1 style="font-size: 18px; text-align: right;">المتواجدون حالياً في البيت 🟢</h1>
            <div class="users-list" id="users-list"></div>
        </div>
    </div>

    <!-- 3. شاشة الغرفة والسينما والتفاعل 2D -->
    <div id="room-screen">
        <div style="padding: 10px; text-align: center; width: 100%;">
            <span id="call-status-text" style="color: #10b981; font-weight: bold; font-size: 14px;">جاري تشغيل الغرفة...</span>
        </div>

        <!-- الغرفة الافتراضية ثنائية الأبعاد -->
        <div class="room-canvas-container">
            <!-- التلفزة المعلقة -->
            <div class="tv-screen">
                <div id="player"></div>
            </div>

            <!-- مغير الفيديو -->
            <div class="tv-controls">
                <input type="text" id="video-url" placeholder="رابط يوتيوب...">
                <button id="btn-load-video">عرض</button>
            </div>

            <canvas id="room-canvas"></canvas>
        </div>

        <!-- اللوحة السفلية للتفاعلات والتحكم -->
        <div class="bottom-panel">
            <!-- تفاعلات عند الاقتراب -->
            <div class="interaction-btns" id="interaction-zone">
                <button class="btn-interact" id="btn-hug">🫂 عناق</button>
                <button class="btn-interact" id="btn-pillow" style="background: #e11d48;">💥 مخذة</button>
            </div>

            <div class="controls-row">
                <button id="btn-mute" class="btn-round btn-mute">🎙️</button>
                
                <!-- أزرار الحركة للهواتف -->
                <div class="joystick-container">
                    <button class="joy-btn" id="btn-left">◀</button>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <button class="joy-btn" id="btn-up">▲</button>
                        <button class="joy-btn" id="btn-down">▼</button>
                    </div>
                    <button class="joy-btn" id="btn-right">▶</button>
                </div>

                <button id="btn-hangup" class="btn-round btn-hangup">❌</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, myAvatar = "https://api.dicebear.com/7.x/adventurer/svg?seed=default";
        let peer, localStream, currentCall, partnerId = null;
        let ytPlayer = null;
        
        let ignoreNextStateChange = false; 
        let lastActionSent = null;

        // متغيرات الغرفة 2D الكانفاس
        const canvas = document.getElementById('room-canvas');
        const ctx = canvas.getContext('2d');
        let players = {}; // لتخزين مواقع جميع اللاعبين فـ الغرفة

        // إحداثيات الأفاتار الخاص بي الافتراضية
        let myPos = { x: 200, y: 250 };
        const speed = 12;

        // لود أصول الصور في الكانفاس
        const avatarImages = {};

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // تحميل مكتبة يوتيوب
        function loadYoutubeAPI() {
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            } else {
                onYouTubeIframeAPIReady();
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '5qap5aO4i9A',
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: {
                    'onReady': (e) => { ytPlayer.unMute(); ytPlayer.setVolume(80); },
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        // تغيير الأفاتار
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    myAvatar = event.target.result;
                    document.getElementById('avatar-preview').src = myAvatar;
                };
                reader.readAsDataURL(file);
            }
        });

        // دخول الغرفة
        document.getElementById('btn-join').addEventListener('click', async () => {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("الرجاء كتابة الاسم!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert("يجب السماح بالوصول للمايكروفون للمكالمة!");
                return;
            }

            peer = new Peer({
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', (id) => {
                myId = id;
                const userRef = ref(db, 'users/' + myId);
                set(userRef, { name: myName, avatar: myAvatar, x: myPos.x, y: myPos.y });
                onDisconnect(userRef).remove();

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                
                loadYoutubeAPI();
                listenForUsers();
                listenForIncomingCalls();
            });
        });

        function listenForUsers() {
            onValue(ref(db, 'users/'), (snapshot) => {
                const users = snapshot.val();
                const listContainer = document.getElementById('users-list');
                listContainer.innerHTML = "";
                for(let id in users) {
                    if(id === myId) continue;
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img class="user-avatar" src="${users[id].avatar}" alt="">
                            <span>${users[id].name}</span>
                        </div>
                        <button style="width:auto; padding:8px 15px;">دخول البيت 🏠</button>
                    `;
                    card.onclick = () => startCall(id, users[id].name);
                    listContainer.appendChild(card);
                }
            });
        }

        function startCall(targetId, targetName) {
            partnerId = targetId;
            document.getElementById('btn-hangup').style.display = 'block';
            document.getElementById('room-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            resizeCanvas();

            const remoteAudio = document.getElementById('remote-audio');
            remoteAudio.play().catch(() => {});

            currentCall = peer.call(targetId, localStream);
            handleCallStreams(currentCall);
            setupCinemaSync();
            startRoomSync();
        }

        function listenForIncomingCalls() {
            peer.on('call', (incomingCall) => {
                currentCall = incomingCall;
                partnerId = incomingCall.peer;
                
                const remoteAudio = document.getElementById('remote-audio');
                remoteAudio.play().catch(() => {});

                currentCall.answer(localStream);
                document.getElementById('room-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
                resizeCanvas();

                handleCallStreams(currentCall);
                setupCinemaSync();
                startRoomSync();
            });
        }

        // تحريك ومزامنة الغرفة ثنائية الأبعاد
        function startRoomSync() {
            // الاستماع لمواقع اللاعبين والتفاعلات
            onValue(ref(db, `calls/${myId}_${partnerId}/room`), (snapshot) => {
                if(snapshot.exists()) {
                    players = snapshot.val();
                }
            });

            // تحديث موقعي باستمرار فـ الـ Firebase
            sendPosition();

            // حلقة رسم الغرفة والأنيميشن (Game Loop)
            requestAnimationFrame(drawRoom);
        }

        function sendPosition() {
            if(partnerId) {
                set(ref(db, `calls/${myId}_${partnerId}/room/${myId}`), {
                    x: myPos.x,
                    y: myPos.y,
                    name: myName,
                    avatar: myAvatar
                });
                set(ref(db, `calls/${partnerId}_${myId}/room/${myId}`), {
                    x: myPos.x,
                    y: myPos.y,
                    name: myName,
                    avatar: myAvatar
                });
            }
        }

        // رسم الغرفة والأثاث والأفاتارات
        let pillowAnimation = null;
        let hugAnimation = null;

        function drawRoom() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. رسم أرضية خشبية دافئة (تأثير بسيط بالخطوط)
            ctx.fillStyle = '#1e1b4b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#312e81';
            ctx.lineWidth = 2;
            for(let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 2. رسم "الكنبة الكبيرة" تحت التلفزة مباشرة
            ctx.fillStyle = '#475569'; // لون الكنبة الرمادي الدافئ
            ctx.beginPath();
            ctx.roundRect(canvas.width/2 - 100, 160, 200, 60, 15);
            ctx.fill();
            ctx.fillStyle = '#64748b'; // مسند الكنبة
            ctx.fillRect(canvas.width/2 - 90, 150, 180, 15);

            // كتابة توجيه صغير فوق الكنبة
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px sans-serif';
            ctx.fillText("منطقة الجلوس للمشاهدة 🍿", canvas.width/2 - 60, 140);

            // 3. رسم الأفاتارات (اللاعبين)
            for(let id in players) {
                const p = players[id];
                
                // رسم الأفاتار الدائري
                ctx.save();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                
                if (!avatarImages[id]) {
                    avatarImages[id] = new Image();
                    avatarImages[id].src = p.avatar;
                }
                
                try {
                    ctx.drawImage(avatarImages[id], p.x - 25, p.y - 25, 50, 50);
                } catch(e) {
                    ctx.fillStyle = '#3b82f6';
                    ctx.fill();
                }
                ctx.restore();

                // رسم إطار مضيء حول الأفاتار
                ctx.strokeStyle = id === myId ? '#3b82f6' : '#10b981';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
                ctx.stroke();

                // اسم اللاعب
                ctx.fillStyle = 'white';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x, p.y - 32);
            }

            // 4. معالجة ورسم أنيميشن "ضربة المخدة"
            if (pillowAnimation) {
                const elapsed = Date.now() - pillowAnimation.startTime;
                const progress = Math.min(elapsed / 500, 1); // نصف ثانية للضربة
                
                const currentX = pillowAnimation.startX + (pillowAnimation.endX - pillowAnimation.startX) * progress;
                const currentY = pillowAnimation.startY + (pillowAnimation.endY - pillowAnimation.startY) * progress;

                ctx.fillStyle = '#f43f5e';
                ctx.beginPath();
                ctx.arc(currentX, currentY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // كتابة نص كوميدي عند الارتطام
                if (progress >= 1) {
                    ctx.fillStyle = '#f43f5e';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText("💥 طاااخ!", pillowAnimation.endX, pillowAnimation.endY - 40);
                    if (elapsed > 1000) pillowAnimation = null; // إنهاء الأنيميشن بعد ثانية
                }
            }

            // 5. معالجة ورسم أنيميشن "العناق"
            if (hugAnimation) {
                const elapsed = Date.now() - hugAnimation.time;
                ctx.fillStyle = '#ec4899';
                ctx.font = '24px sans-serif';
                ctx.fillText("💖🫂💖", hugAnimation.x, hugAnimation.y - 45);
                if (elapsed > 2000) hugAnimation = null;
            }

            // الاستمرار في الرندرة والتحريك
            if (partnerId) {
                checkInteractionDistance();
                requestAnimationFrame(drawRoom);
            }
        }

        // حساب المسافة بيني وبين اللاعب الآخر لتفعيل أزرار التفاعل
        function checkInteractionDistance() {
            if(!partnerId || !players[partnerId]) return;
            const partner = players[partnerId];
            const dist = Math.hypot(myPos.x - partner.x, myPos.y - partner.y);
            
            const interactionZone = document.getElementById('interaction-zone');
            if (dist < 80) {
                document.getElementById('btn-hug').style.display = 'block';
                document.getElementById('btn-pillow').style.display = 'block';
            } else {
                document.getElementById('btn-hug').style.display = 'none';
                document.getElementById('btn-pillow').style.display = 'none';
            }
        }

        // أزرار الحركة والتنقل
        function move(dir) {
            if (dir === 'up' && myPos.y > 150) myPos.y -= speed;
            if (dir === 'down' && myPos.y < canvas.height - 30) myPos.y += speed;
            if (dir === 'left' && myPos.x > 30) myPos.x -= speed;
            if (dir === 'right' && myPos.x < canvas.width - 30) myPos.x += speed;
            sendPosition();
        }

        // دعم الكيبورد للتحريك
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('room-screen').style.display !== 'flex') return;
            if (e.key === 'ArrowUp' || e.key === 'w') move('up');
            if (e.key === 'ArrowDown' || e.key === 's') move('down');
            if (e.key === 'ArrowLeft' || e.key === 'a') move('left');
            if (e.key === 'ArrowRight' || e.key === 'd') move('right');
        });

        // دعم اللمس فالهواتف عبر أزرار التحكم السفلية
        document.getElementById('btn-up').onclick = () => move('up');
        document.getElementById('btn-down').onclick = () => move('down');
        document.getElementById('btn-left').onclick = () => move('left');
        document.getElementById('btn-right').onclick = () => move('right');

        // أحداث التفاعلات (الحضن والمخدة)
        document.getElementById('btn-pillow').onclick = () => {
            if (!partnerId || !players[partnerId]) return;
            const target = players[partnerId];
            const actionData = {
                type: 'pillow',
                startX: myPos.x, startY: myPos.y,
                endX: target.x, endY: target.y,
                startTime: Date.now()
            };
            set(ref(db, `calls/${myId}_${partnerId}/interaction`), actionData);
            set(ref(db, `calls/${partnerId}_${myId}/interaction`), actionData);
        };

        document.getElementById('btn-hug').onclick = () => {
            if (!partnerId || !players[partnerId]) return;
            const target = players[partnerId];
            const actionData = {
                type: 'hug',
                x: (myPos.x + target.x)/2, y: (myPos.y + target.y)/2,
                time: Date.now()
            };
            set(ref(db, `calls/${myId}_${partnerId}/interaction`), actionData);
            set(ref(db, `calls/${partnerId}_${myId}/interaction`), actionData);
        };

        // مزامنة التفاعلات الحركية
        function listenToInteractions(callKey) {
            onValue(ref(db, `calls/${callKey}/interaction`), (snapshot) => {
                if (!snapshot.exists()) return;
                const data = snapshot.val();
                if (data.type === 'pillow') {
                    pillowAnimation = data;
                } else if (data.type === 'hug') {
                    hugAnimation = data;
                }
            });
        }

        // تشغيل مغير الفيديو يوتيوب المشترك
        document.getElementById('btn-load-video').addEventListener('click', () => {
            const urlInput = document.getElementById('video-url').value;
            const videoId = extractYouTubeId(urlInput);
            if (videoId && partnerId) {
                const videoData = { videoId: videoId, action: 'load', time: 0, timestamp: Date.now() };
                set(ref(db, `calls/${myId}_${partnerId}/videoState`), videoData);
                set(ref(db, `calls/${partnerId}_${myId}/videoState`), videoData);
            }
        });

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onPlayerStateChange(event) {
            if (ignoreNextStateChange) return;
            let action = '';
            if (event.data === YT.PlayerState.PLAYING) action = 'play';
            if (event.data === YT.PlayerState.PAUSED) action = 'pause';

            if (action !== '' && action !== lastActionSent) {
                lastActionSent = action;
                const videoState = { action: action, time: ytPlayer.getCurrentTime(), timestamp: Date.now() };
                if (partnerId) {
                    update(ref(db, `calls/${myId}_${partnerId}/videoState`), videoState);
                    update(ref(db, `calls/${partnerId}_${myId}/videoState`), videoState);
                }
            }
        }

        function setupCinemaSync() {
            const listenSync = (callKey) => {
                onValue(ref(db, `calls/${callKey}/videoState`), (snapshot) => {
                    if (!snapshot.exists() || !ytPlayer) return;
                    const data = snapshot.val();
                    ignoreNextStateChange = true;

                    if (data.action === 'load') {
                        ytPlayer.loadVideoById(data.videoId, 0);
                        setTimeout(() => { ignoreNextStateChange = false; }, 1000);
                        return;
                    }

                    const localTime = ytPlayer.getCurrentTime();
                    const diff = Math.abs(localTime - data.time);

                    if (data.action === 'play') {
                        if (diff > 1.5) ytPlayer.seekTo(data.time, true);
                        ytPlayer.playVideo();
                    } else if (data.action === 'pause') {
                        ytPlayer.pauseVideo();
                        if (diff > 1.5) ytPlayer.seekTo(data.time, true);
                    }

                    setTimeout(() => { ignoreNextStateChange = false; }, 500);
                });
            };

            listenSync(`${myId}_${partnerId}`);
            listenSync(`${partnerId}_${myId}`);
            listenToInteractions(`${myId}_${partnerId}`);
            listenToInteractions(`${partnerId}_${myId}`);
        }

        function handleCallStreams(call) {
            call.on('stream', (remoteStream) => {
                document.getElementById('call-status-text').innerText = "أنتما معاً الآن في البيت الافتراضي! 🍿🛋️";
                const remoteAudio = document.getElementById('remote-audio');
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play().catch(() => {});
            });
            call.on('close', () => endCallInterface());
        }

        document.getElementById('btn-hangup').addEventListener('click', () => {
            if(currentCall) currentCall.close();
            remove(ref(db, `calls/${myId}_${partnerId}`));
            remove(ref(db, `calls/${partnerId}_${myId}`));
            endCallInterface();
        });

        function endCallInterface() {
            document.getElementById('room-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('remote-audio').srcObject = null;
            if (ytPlayer) ytPlayer.stopVideo();
        }

        let isMuted = false;
        document.getElementById('btn-mute').addEventListener('click', () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('btn-mute').classList.toggle('active', isMuted);
            document.getElementById('btn-mute').innerText = isMuted ? "🔇" : "🎙️";
        });
    </script>
</body>
</html>
