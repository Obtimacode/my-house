<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyHouse Cozy Cinema</title>
    <!-- PeerJS للمكالمات الصوتية المباشرة -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- مكتبة Lucide للأيقونات العصرية الأنيقة -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #111827;
            --accent: #0066ff;
            --accent-hover: #0052cc;
            --danger: #ef4444;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
        }
        
        .container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 400px; 
            padding: 30px 24px; 
            border-radius: 20px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); 
            text-align: center; 
        }
        
        h1 { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 24px; 
            color: var(--text); 
            letter-spacing: -0.5px;
        }
        
        .avatar-picker { 
            position: relative; 
            width: 90px; 
            height: 90px; 
            margin: 0 auto 24px; 
            cursor: pointer; 
        }
        .avatar-picker img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--accent); 
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.2);
        }
        .avatar-picker input { display: none; }
        .avatar-overlay { 
            position: absolute; 
            bottom: 0; 
            right: 0; 
            background: var(--accent); 
            padding: 6px; 
            border-radius: 50%; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .avatar-overlay svg { width: 14px; height: 14px; }
        
        input[type="text"] { 
            width: 100%; 
            padding: 12px 16px; 
            background: #1f2937; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            color: white; 
            font-size: 15px; 
            margin-bottom: 16px; 
            outline: none; 
            text-align: center;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        
        #app-screen { display: none; }
        .users-list { margin-top: 15px; max-height: 320px; overflow-y: auto; text-align: right; }
        .user-card { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 16px; 
            background: #151f32; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .user-card:hover {
            border-color: #2a3a55;
            background: #1b283f;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .call-icon { 
            background: var(--accent); 
            color: white;
            padding: 8px; 
            border-radius: 50%; 
            display: flex; 
            width: 32px; 
            height: 32px; 
            align-items: center; 
            justify-content: center; 
        }
        .call-icon svg { width: 16px; height: 16px; }

        /* شاشة السينما والمكالمة */
        #call-screen { 
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #05070c; z-index: 100; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 20px 15px;
        }
        
        /* مساحة الفيديو والسينما */
        .cinema-room {
            position: relative;
            width: 100%;
            height: 60%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        #video-container {
            width: 100%;
            height: 100%;
        }

        #player {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* حقل إدخال رابط الفيديو */
        .video-selector {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: #0f172a;
            position: relative;
            z-index: 30;
            border-top: 1px solid var(--border-color);
        }
        .video-selector input {
            flex: 1;
            padding: 10px 14px;
            background: #070a12;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 13px;
        }
        .video-selector button {
            width: auto;
            padding: 10px 18px;
            font-size: 13px;
            border-radius: 8px;
        }

        /* التفاعلات الطائرة */
        .reactions-bar {
            position: absolute;
            bottom: 75px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            background: rgba(15, 23, 42, 0.65);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 20;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .react-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: auto;
            padding: 0;
            transition: transform 0.1s;
        }
        .react-btn:active { transform: scale(1.3); }

        /* حاوية عناصر الإيموجي الطائرة */
        .floating-container {
            position: absolute;
            bottom: 130px; 
            width: 100%;
            height: 60%;
            pointer-events: none;
            overflow: hidden;
            z-index: 15;
        }

        .floating-emoji {
            position: absolute;
            bottom: 0;
            font-size: 30px;
            animation: floatUp 2.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-300px) scale(1) rotate(var(--rot)); opacity: 0; }
        }

        /* أزرار التحكم */
        .controls { display: flex; gap: 16px; justify-content: center; width: 100%; margin-top: 15px; }
        .btn-control { 
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            cursor: pointer; 
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-control:active { transform: scale(0.95); }
        .btn-mute { background: #1e293b; }
        .btn-mute:hover { background: #334155; }
        .btn-mute.active { background: var(--danger); }
        .btn-hangup { background: var(--danger); }
        .btn-hangup:hover { background: #dc2626; }
        .btn-accept { background: #10b981; gap: 8px; border-radius: 30px; width: auto; padding: 0 20px; font-weight: 500; font-size: 14px; }
        .btn-accept:hover { background: #059669; }

        @media (max-width: 480px) {
            .cinema-room { height: 65%; }
            #call-screen { padding: 15px 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. شاشة الدخول -->
        <div id="login-screen">
            <h1>انضم إلى MyHouse Cinema</h1>
            <div class="avatar-picker" onclick="document.getElementById('file-input').click()">
                <img id="avatar-preview" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="Avatar">
                <div class="avatar-overlay">
                    <i data-lucide="camera"></i>
                </div>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <input type="text" id="username" placeholder="اكتب اسمك المستعار..." autocomplete="off">
            <button id="btn-join">دخول الآن</button>
        </div>

        <!-- 2. شاشة المتواجدين -->
        <div id="app-screen">
            <h1 style="font-size: 16px; text-align: right; display: flex; align-items: center; gap: 8px; justify-content: flex-start; flex-direction: row-reverse;">
                <span style="width: 8px; height: 8px; background-color: #10b981; border-radius: 50%;"></span>
                المتواجدون حالياً
            </h1>
            <div class="users-list" id="users-list"></div>
        </div>
    </div>

    <!-- 3. شاشة السينما والمكالمة الصوتية المباشرة -->
    <div id="call-screen">
        <div style="text-align: center; color: white;">
            <h3 id="call-user-name" style="font-weight: 500; font-size: 18px; margin-bottom: 4px;">اسم الطرف الآخر</h3>
            <p id="call-status-text" style="color: var(--text-muted); font-size: 13px;">جاري الاتصال الصوتي...</p>
        </div>

        <!-- غرفة السينما المشتركة -->
        <div class="cinema-room">
            <div id="video-container">
                <div id="player"></div>
            </div>

            <div class="floating-container" id="floating-container"></div>

            <div class="reactions-bar">
                <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
                <button class="react-btn" onclick="sendReaction('😂')">😂</button>
                <button class="react-btn" onclick="sendReaction('😮')">😮</button>
                <button class="react-btn" onclick="sendReaction('😭')">😭</button>
            </div>

            <div class="video-selector">
                <input type="text" id="video-url" placeholder="ألصق رابط فيديو يوتيوب هنا...">
                <button id="btn-load-video">شغّل</button>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-mute" class="btn-control btn-mute">
                <i data-lucide="mic"></i>
            </button>
            <button id="btn-accept" class="btn-control btn-accept" style="display: none;">
                <i data-lucide="phone"></i>
                قبول
            </button>
            <button id="btn-hangup" class="btn-control btn-hangup">
                <i data-lucide="phone-off"></i>
            </button>
        </div>
    </div>

    <!-- عنصر الصوت -->
    <audio id="remote-audio" autoplay playsinline></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, myAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=default";
        let peer, localStream, currentCall, partnerId = null;
        let ytPlayer = null;
        
        let ignoreNextStateChange = false; 
        let lastActionSent = null;

        // تفعيل مكتبة الأيقونات
        lucide.createIcons();

        function loadYoutubeAPI() {
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            } else {
                onYouTubeIframeAPIReady();
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '5qap5aO4i9A',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'rel': 0,
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            ytPlayer.unMute();
            ytPlayer.setVolume(80);
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    myAvatar = event.target.result;
                    document.getElementById('avatar-preview').src = myAvatar;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
            myName = document.getElementById('username').value.trim();
            if(!myName) return alert("الرجاء كتابة الاسم!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert("يجب السماح بالوصول للمايكروفون للمكالمة الصوتية!");
                return;
            }

            peer = new Peer({
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                myId = id;
                const userRef = ref(db, 'users/' + myId);
                set(userRef, { name: myName, avatar: myAvatar });
                onDisconnect(userRef).remove();

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                
                loadYoutubeAPI();
                
                listenForUsers();
                listenForIncomingCalls();
            });

            peer.on('error', (err) => {
                console.error("PeerJS Error:", err);
            });
        });

        function listenForUsers() {
            onValue(ref(db, 'users/'), (snapshot) => {
                const users = snapshot.val();
                const listContainer = document.getElementById('users-list');
                listContainer.innerHTML = "";
                for(let id in users) {
                    if(id === myId) continue;
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-info">
                            <img class="user-avatar" src="${users[id].avatar}" alt="">
                            <span style="font-size: 14px; font-weight: 500;">${users[id].name}</span>
                        </div>
                        <div class="call-icon"><i data-lucide="phone"></i></div>
                    `;
                    card.onclick = () => startCall(id, users[id].name);
                    listContainer.appendChild(card);
                    lucide.createIcons(); // تحديث الأيقونات في العناصر الجديدة
                }
            });
        }

        function startCall(targetId, targetName) {
            partnerId = targetId;
            document.getElementById('call-user-name').innerText = targetName;
            document.getElementById('btn-accept').style.display = 'none';
            document.getElementById('call-screen').style.display = 'flex';

            const remoteAudio = document.getElementById('remote-audio');
            remoteAudio.play().catch(() => {});

            currentCall = peer.call(targetId, localStream);
            handleCallStreams(currentCall);
            setupCinemaSync();
        }

        function listenForIncomingCalls() {
            peer.on('call', (incomingCall) => {
                currentCall = incomingCall;
                partnerId = incomingCall.peer;
                
                onValue(ref(db, 'users/' + partnerId), (snapshot) => {
                    const caller = snapshot.val();
                    document.getElementById('call-user-name').innerText = caller ? caller.name : "شخص مجهول";
                }, { onlyOnce: true });

                document.getElementById('call-status-text').innerText = "مكالمة واردة...";
                document.getElementById('btn-accept').style.display = 'inline-flex';
                document.getElementById('call-screen').style.display = 'flex';

                document.getElementById('btn-accept').onclick = () => {
                    const remoteAudio = document.getElementById('remote-audio');
                    remoteAudio.play().catch(() => {});

                    currentCall.answer(localStream);
                    document.getElementById('btn-accept').style.display = 'none';
                    handleCallStreams(currentCall);
                    setupCinemaSync();
                };
            });
        }

        window.sendReaction = function(emoji) {
            if (!partnerId) return;
            const reactionId = Date.now();
            set(ref(db, `calls/${myId}_${partnerId}/reactions/${reactionId}`), { emoji: emoji });
            set(ref(db, `calls/${partnerId}_${myId}/reactions/${reactionId}`), { emoji: emoji });
            showFloatingEmoji(emoji);
        };

        function showFloatingEmoji(emoji) {
            const container = document.getElementById('floating-container');
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = emoji;
            
            const leftOffset = Math.random() * 80 + 10; 
            const rotation = (Math.random() * 90 - 45) + "deg";
            
            el.style.left = `${leftOffset}%`;
            el.style.setProperty('--rot', rotation);

            container.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        document.getElementById('btn-load-video').addEventListener('click', () => {
            const urlInput = document.getElementById('video-url').value;
            const videoId = extractYouTubeId(urlInput);
            if (videoId && partnerId) {
                const videoData = { videoId: videoId, action: 'load', time: 0, timestamp: Date.now() };
                set(ref(db, `calls/${myId}_${partnerId}/videoState`), videoData);
                set(ref(db, `calls/${partnerId}_${myId}/videoState`), videoData);
            }
        });

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function onPlayerStateChange(event) {
            if (ignoreNextStateChange) return;

            let action = '';
            if (event.data === YT.PlayerState.PLAYING) action = 'play';
            if (event.data === YT.PlayerState.PAUSED) action = 'pause';

            if (action !== '' && action !== lastActionSent) {
                lastActionSent = action;
                const videoState = {
                    action: action,
                    time: ytPlayer.getCurrentTime(),
                    timestamp: Date.now()
                };
                if (partnerId) {
                    update(ref(db, `calls/${myId}_${partnerId}/videoState`), videoState);
                    update(ref(db, `calls/${partnerId}_${myId}/videoState`), videoState);
                }
            }
        }

        function setupCinemaSync() {
            const listenSync = (callKey) => {
                onValue(ref(db, `calls/${callKey}/videoState`), (snapshot) => {
                    if (!snapshot.exists() || !ytPlayer) return;
                    const data = snapshot.val();
                    
                    ignoreNextStateChange = true;

                    if (data.action === 'load') {
                        ytPlayer.loadVideoById(data.videoId, 0);
                        setTimeout(() => { ignoreNextStateChange = false; }, 1000);
                        return;
                    }

                    const localTime = ytPlayer.getCurrentTime();
                    const diff = Math.abs(localTime - data.time);

                    if (data.action === 'play') {
                        if (diff > 1.5) {
                            ytPlayer.seekTo(data.time, true);
                        }
                        ytPlayer.playVideo();
                    } else if (data.action === 'pause') {
                        ytPlayer.pauseVideo();
                        if (diff > 1.5) {
                            ytPlayer.seekTo(data.time, true);
                        }
                    }

                    setTimeout(() => {
                        ignoreNextStateChange = false;
                    }, 500);
                });

                onValue(ref(db, `calls/${callKey}/reactions`), (snapshot) => {
                    if (snapshot.exists()) {
                        const reactions = snapshot.val();
                        const keys = Object.keys(reactions);
                        const latestKey = keys[keys.length - 1];
                        
                        if (Date.now() - Number(latestKey) < 2000) {
                            showFloatingEmoji(reactions[latestKey].emoji);
                        }
                    }
                });
            };

            listenSync(`${myId}_${partnerId}`);
            listenSync(`${partnerId}_${myId}`);
        }

        function handleCallStreams(call) {
            call.on('stream', (remoteStream) => {
                document.getElementById('call-status-text').innerText = "أنتما تشاهدان معاً الآن! 🍿🎧";
                const remoteAudio = document.getElementById('remote-audio');
                
                remoteAudio.srcObject = remoteStream;
                remoteAudio.play().catch(e => {
                    console.log("Audio play deferred to user click.", e);
                });
            });
            call.on('close', () => endCallInterface());
        }

        document.getElementById('btn-hangup').addEventListener('click', () => {
            if(currentCall) currentCall.close();
            remove(ref(db, `calls/${myId}_${partnerId}`));
            remove(ref(db, `calls/${partnerId}_${myId}`));
            endCallInterface();
        });

        function endCallInterface() {
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('remote-audio').srcObject = null;
            if (ytPlayer) ytPlayer.stopVideo();
        }

        let isMuted = false;
        document.getElementById('btn-mute').addEventListener('click', () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('btn-mute').classList.toggle('active', isMuted);
            
            // تحديث الأيقونة برمجياً عند كتم الصوت
            const icon = document.querySelector('#btn-mute i');
            if (isMuted) {
                icon.setAttribute('data-lucide', 'mic-off');
            } else {
                icon.setAttribute('data-lucide', 'mic');
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
