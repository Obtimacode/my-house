<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCall - Admin Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@800&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-dark: #05070f;
            --card-bg: rgba(13, 18, 33, 0.95);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #0066ff;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; }

        /* Auth Screen */
        #login-modal {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border); border-radius: 10px; color: #fff; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; background: var(--accent-blue); border: none;
            border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer;
        }

        /* App Layout */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
            color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: var(--accent-blue); }
        .btn-danger { color: var(--danger-red); border-color: rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: var(--danger-red); color: #fff; }

        .list-box { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; height: 350px; overflow-y: auto; font-size: 13px; }
        .chat-line { margin-bottom: 8px; word-break: break-all; }
        .chat-line strong { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h3 style="margin-bottom:15px;">تسجيل دخول الإدارة</h3>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button id="btn-login">دخول</button>
        </div>
    </div>

    <header>
        <h2>WatchCall <span>Control Center</span></h2>
        <div>المتصلون: <strong id="cnt-online" style="color:var(--success-green)">0</strong></div>
    </header>

    <div class="grid">
        <!-- Users -->
        <div class="card">
            <h4>المستخدمون النشطون</h4>
            <div class="list-box" id="users-container">جاري التحميل...</div>
        </div>

        <!-- Chat Feed -->
        <div class="card">
            <h4>مراقبة المحادثات</h4>
            <div class="list-box" id="chat-container">لا توجد رسائل...</div>
        </div>

        <!-- Controls -->
        <div class="card">
            <h4>العمليات والمزامنة</h4>
            <button class="btn" id="act-broadcast">إرسال إشعار عام</button>
            <button class="btn btn-danger" id="act-clear">إنهاء وحذف كل المحادثات</button>
            <hr style="border-color:var(--card-border)">
            <div id="audio-status" style="font-size:12px; text-align:center; color:var(--text-muted)">حالة الصوت: معطلة</div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myPeer = null;

        // Login Logic
        document.getElementById('btn-login').onclick = () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u === "admin" && p === "reda2019") {
                document.getElementById('login-modal').style.display = 'none';
                startAdmin();
            } else {
                alert("بيانات غير صحيحة");
            }
        };

        function startAdmin() {
            if (window.lucide) lucide.createIcons();

            // Initialize PeerJS
            try {
                myPeer = new Peer('admin-control-id');
            } catch(e) { console.log(e); }

            // 1. Online Count
            onValue(ref(db, 'online_presence'), (snap) => {
                document.getElementById('cnt-online').innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
            });

            // 2. Load Users
            onValue(ref(db, 'users'), (snap) => {
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                if (!snap.exists()) { container.innerHTML = 'لا يوجد مستخدمون'; return; }

                snap.forEach((child) => {
                    const u = child.val();
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding:6px; background:rgba(255,255,255,0.03); border-radius:6px;";
                    div.innerHTML = `
                        <div>
                            <div><strong>${u.name || 'مستخدم'}</strong></div>
                            <small style="color:gray">${child.key}</small>
                        </div>
                        <button class="btn btn-listen" data-id="${child.key}">استماع</button>
                    `;
                    container.appendChild(div);
                });

                document.querySelectorAll('.btn-listen').forEach(btn => {
                    btn.onclick = () => listenTo(btn.getAttribute('data-id'));
                });
            });

            // 3. Monitor Chat
            onValue(ref(db, 'chats'), (snap) => {
                const box = document.getElementById('chat-container');
                box.innerHTML = '';
                if (!snap.exists()) return;

                snap.forEach((room) => {
                    room.forEach((m) => {
                        const data = m.val();
                        const line = document.createElement('div');
                        line.className = 'chat-line';
                        line.innerHTML = `<strong>${data.sender || 'مجهول'}:</strong> ${data.text || ''}`;
                        box.appendChild(line);
                    });
                });
                box.scrollTop = box.scrollHeight;
            });

            // 4. Listen Functionality
            function listenTo(peerId) {
                if (!myPeer) return alert("PeerJS غير متصل");
                document.getElementById('audio-status').innerText = "جاري الاتصال...";
                
                // Call target peer
                const call = myPeer.call(peerId, null);
                if (!call) return alert("تعذر إنشاء الاتصال");

                call.on('stream', (stream) => {
                    const audio = document.getElementById('remote-audio');
                    audio.srcObject = stream;
                    audio.play();
                    document.getElementById('listening-status').innerText = "متصل بالصوت الحي";
                });
            }

            // 5. Actions
            document.getElementById('act-clear').onclick = () => {
                if (confirm("مسح كافة الغرف والمحادثات؟")) {
                    remove(ref(db, 'chats'));
                    remove(ref(db, 'calls'));
                    alert("تم الحذف بنجاح");
                }
            };

            document.getElementById('act-broadcast').onclick = () => {
                const txt = prompt("أدخل نص التنبيه العام:");
                if (txt) {
                    push(ref(db, 'system_broadcasts'), { text: txt, time: Date.now() });
                    alert("تم الإرسال");
                }
            };
        }
    </script>
</body>
</html>
