<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchCall - Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #111827;
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* شاشة تسجيل الدخول */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .login-box {
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: 40px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; font-weight: 800; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border); border-radius: 8px; color: white; text-align: center; outline: none;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button {
            width: 100%; padding: 12px; background: var(--primary); border: none;
            border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .login-box button:hover { background: #2563eb; }

        /* الواجهة الرئيسية */
        #dashboard { display: none; padding: 20px; height: 100%; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); margin-bottom: 20px; }
        header h1 { font-size: 20px; font-weight: 800; color: var(--primary); }
        
        .stats { display: flex; gap: 15px; }
        .stat-badge { background: var(--card-bg); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--card-border); font-size: 14px; font-weight: 700; }
        .stat-badge span { color: var(--primary); margin-right: 5px; font-size: 16px; }

        .grid { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; flex: 1; min-height: 0; }
        .panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 15px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--card-border); font-weight: 700; font-size: 15px; text-align: center; }
        .panel-content { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* عناصر القوائم */
        .list-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .list-item .info { display: flex; flex-direction: column; }
        .list-item .name { font-weight: 700; font-size: 14px; }
        .list-item .id { font-size: 11px; color: var(--text-muted); direction: ltr; text-align: right; }
        
        .chat-line { font-size: 13px; line-height: 1.5; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-line strong { color: var(--primary); }

        /* الأزرار */
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-primary { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); color: var(--primary); width: 100%; margin-bottom: 10px; padding: 12px;}
        .btn-primary:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="login-screen">
        <div class="login-box">
            <h2>لوحة الإدارة</h2>
            <input type="text" id="admin-user" placeholder="اسم المستخدم">
            <input type="password" id="admin-pass" placeholder="كلمة المرور">
            <button id="btn-login">دخول</button>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" style="display: none;">
        <header>
            <h1>WatchCall Admin</h1>
            <div class="stats">
                <div class="stat-badge">المتواجدون: <span id="count-online">0</span></div>
                <div class="stat-badge">المكالمات: <span id="count-calls">0</span></div>
            </div>
        </header>

        <div class="grid">
            
            <!-- قائمة المستخدمين -->
            <div class="panel">
                <div class="panel-header">المستخدمون النشطون</div>
                <div class="panel-content" id="users-list">
                    <div style="text-align: center; color: var(--text-muted); font-size: 12px;">جاري التحميل...</div>
                </div>
            </div>

            <!-- مراقبة المحادثات -->
            <div class="panel">
                <div class="panel-header">المحادثات العامة (Live)</div>
                <div class="panel-content" id="chat-feed" style="background: rgba(0,0,0,0.2);">
                    <!-- ستظهر الرسائل هنا -->
                </div>
            </div>

            <!-- أدوات التحكم -->
            <div class="panel">
                <div class="panel-header">إجراءات السيرفر</div>
                <div class="panel-content">
                    <button class="btn btn-primary" onclick="window.sendBroadcast()">
                        إرسال إشعار عام للزوار
                    </button>
                    <button class="btn btn-danger" style="width: 100%; padding: 12px;" onclick="window.clearAllChats()">
                        مسح جميع المحادثات
                    </button>
                    <button class="btn btn-danger" style="width: 100%; padding: 12px; margin-top: 5px;" onclick="window.clearAllCalls()">
                        إنهاء جميع المكالمات
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // إعدادات قاعدة البيانات الخاصة بك
        const firebaseConfig = { databaseURL: "https://my-house-672f0-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // نظام تسجيل الدخول
        document.getElementById('btn-login').addEventListener('click', () => {
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();

            if (user === "admin" && pass === "reda2019") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                startDashboard();
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        });

        // تشغيل اللوحة بعد الدخول
        function startDashboard() {
            
            // 1. إحصائيات المتواجدين والمكالمات
            onValue(ref(db, 'online_presence'), (snap) => {
                document.getElementById('count-online').innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
            });
            onValue(ref(db, 'calls'), (snap) => {
                document.getElementById('count-calls').innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
            });

            // 2. جلب قائمة المستخدمين
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('users-list');
                list.innerHTML = '';
                if (!snap.exists()) {
                    list.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 12px;">لا يوجد مستخدمون حالياً</div>';
                    return;
                }
                snap.forEach((child) => {
                    const u = child.val();
                    list.innerHTML += `
                        <div class="list-item">
                            <div class="info">
                                <span class="name">${u.name || 'مستخدم مجهول'}</span>
                                <span class="id">${child.key}</span>
                            </div>
                            <button class="btn btn-danger" onclick="window.kickUser('${child.key}')">طرد</button>
                        </div>
                    `;
                });
            });

            // 3. جلب وقراءة المحادثات الحية
            onValue(ref(db, 'chats'), (snap) => {
                const feed = document.getElementById('chat-feed');
                feed.innerHTML = '';
                if (!snap.exists()) {
                    feed.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 12px;">لا توجد محادثات</div>';
                    return;
                }
                snap.forEach((room) => {
                    room.forEach((msgSnap) => {
                        const m = msgSnap.val();
                        feed.innerHTML += `
                            <div class="chat-line">
                                <strong>${m.sender || 'زائر'}:</strong> ${m.text || ''}
                            </div>
                        `;
                    });
                });
                feed.scrollTop = feed.scrollHeight; // النزول لآخر رسالة تلقائياً
            });

            // --- دوال التحكم الخاصة بالأزرار ---
            
            window.kickUser = (userId) => {
                if(confirm("هل أنت متأكد من طرد هذا المستخدم؟")) {
                    remove(ref(db, `users/${userId}`));
                    // يمكنك أيضاً حذف تواجده من online_presence إذا لزم الأمر
                }
            };

            window.clearAllChats = () => {
                if(confirm("سيتم حذف جميع رسائل الدردشة، هل توافق؟")) {
                    remove(ref(db, 'chats'));
                }
            };

            window.clearAllCalls = () => {
                if(confirm("سيتم إغلاق جميع المكالمات النشطة، هل توافق؟")) {
                    remove(ref(db, 'calls'));
                }
            };

            window.sendBroadcast = () => {
                const msg = prompt("اكتب الإشعار الذي سيظهر لجميع الزوار:");
                if(msg) {
                    push(ref(db, 'system_broadcasts'), { text: msg, timestamp: Date.now() });
                    alert("تم إرسال الإشعار بنجاح.");
                }
            };
        }
    </script>
</body>
</html>
